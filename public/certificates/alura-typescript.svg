<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>

  <!-- Decorative corner elements -->
  <circle cx="80" cy="80" r="30" fill="#0086C9" opacity="0.1"/>
  <circle cx="1120" cy="720" r="30" fill="#0086C9" opacity="0.1"/>

  <!-- Decorative border -->
  <rect x="40" y="40" width="1120" height="720" fill="none" stroke="#0086C9" stroke-width="3" rx="10"/>
  <rect x="50" y="50" width="1100" height="700" fill="none" stroke="#0086C9" stroke-width="1" rx="8" opacity="0.5"/>

  <!-- Ribbon/Medal -->
  <circle cx="600" cy="100" r="60" fill="#0086C9"/>
  <path d="M 580 150 Q 590 170 600 180 Q 610 170 620 150" fill="#0086C9"/>
  <text x="600" y="120" font-size="60" font-weight="bold" fill="white" text-anchor="middle" font-family="Georgia, serif">✓</text>

  <!-- Main title -->
  <text x="600" y="240" font-size="52" font-weight="bold" fill="#333" text-anchor="middle" font-family="Georgia, serif">Certificado</text>
  <text x="600" y="290" font-size="48" font-weight="bold" fill="#0086C9" text-anchor="middle" font-family="Georgia, serif">de Conclusão</text>

  <!-- Subtitle -->
  <text x="600" y="350" font-size="24" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">Concedido a</text>

  <!-- Name -->
  <text x="600" y="410" font-size="40" font-weight="bold" fill="#0086C9" text-anchor="middle" font-family="Georgia, serif">Augusto Brito</text>

  <!-- Course description -->
  <text x="600" y="480" font-size="20" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">Por completar com sucesso o curso:</text>
  <text x="600" y="520" font-size="26" font-weight="bold" fill="#333" text-anchor="middle" font-family="Arial, sans-serif">TypeScript para Projetos</text>
  <text x="600" y="555" font-size="26" font-weight="bold" fill="#333" text-anchor="middle" font-family="Arial, sans-serif">Escaláveis</text>

  <!-- Hours -->
  <text x="600" y="600" font-size="18" fill="#999" text-anchor="middle" font-family="Arial, sans-serif">Carga horária: 14 horas</text>

  <!-- Decorative line -->
  <line x1="150" y1="650" x2="1050" y2="650" stroke="#0086C9" stroke-width="1" opacity="0.3"/>

  <!-- Date -->
  <text x="150" y="720" font-size="16" fill="#999" font-family="Arial, sans-serif">11 de Março de 2026</text>

  <!-- Signature area -->
  <text x="900" y="700" font-size="16" fill="#999" text-anchor="middle" font-family="Arial, sans-serif">_________________</text>
  <text x="900" y="730" font-size="14" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">Alura</text>

  <!-- Certificate number -->
  <text x="600" y="750" font-size="12" fill="#999" text-anchor="middle" font-family="monospace">Nº: ALURA-2026-003</text>
</svg>
